name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            artifact: whisrs-linux-x86_64
            features: ""
          - name: Linux x86_64 (no local-whisper)
            runner: ubuntu-latest
            artifact: whisrs-linux-x86_64-minimal
            features: "--no-default-features --features tray,overlay"
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
            artifact: whisrs-linux-aarch64
            features: ""
          - name: Linux aarch64 (no local-whisper)
            runner: ubuntu-24.04-arm
            artifact: whisrs-linux-aarch64-minimal
            features: "--no-default-features --features tray,overlay"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config libvulkan-dev glslc

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          GGML_VULKAN: ${{ matrix.features == '' && '1' || '' }}
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build --release --features local-whisper-vulkan
          else
            cargo build --release ${{ matrix.features }}
          fi

      - name: Package
        run: |
          mkdir -p staging
          cp target/release/whisrs staging/
          cp target/release/whisrsd staging/
          cp README.md LICENSE staging/
          cp -r contrib staging/
          cd staging
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-deb:
    name: Debian — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: amd64
            runner: ubuntu-latest
            artifact: whisrs-deb-amd64
            features: ""
            suffix: ""
          - name: amd64 (minimal)
            runner: ubuntu-latest
            artifact: whisrs-deb-amd64-minimal
            features: "--no-default-features --features tray,overlay"
            suffix: "-minimal"
          - name: arm64
            runner: ubuntu-24.04-arm
            artifact: whisrs-deb-arm64
            features: ""
            suffix: ""
          - name: arm64 (minimal)
            runner: ubuntu-24.04-arm
            artifact: whisrs-deb-arm64-minimal
            features: "--no-default-features --features tray,overlay"
            suffix: "-minimal"

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper libasound2-dev libxkbcommon-dev \
            pkg-config libclang-dev cmake libvulkan-dev glslc

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build Debian package
        id: deb
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          CARGO=cargo FEATURES="$FEATURES" dpkg-buildpackage -b -us -uc -d
          pkg=(../whisrs_*.deb)
          out="$(basename "${pkg[0]%.deb}")${{ matrix.suffix }}.deb"
          mv "${pkg[0]}" "$out"
          echo "file=$out" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.deb.outputs.file }}

  release:
    name: Create Release
    needs: [build, build-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
